# Render Blueprint：连接 GitHub 后选 "Apply" 即可部署后端
# 文档：https://render.com/docs/blueprint-spec
services:
  - type: web
    name: wx-chat-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      # 部署完 Vercel 后，把前端地址填进来（多个用英文逗号）
      - key: CORS_ORIGIN
        sync: false
      # 随机长字符串，用于登录 Token（必填）
      - key: JWT_SECRET
        sync: false
      # 任选：PostgreSQL 的 DATABASE_URL，或 MongoDB 的 MONGODB_URI（二选一即可持久化）
      - key: DATABASE_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        sync: false
